[build]
builder = "NIXPACKS"
# Do not run npm ci here — Railpack already installs deps; npm ci again causes EBUSY on node_modules/.cache
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
preDeployCommand = "npm run db:deploy"
# Use /api/health/live so deploy is not blocked when DATABASE_URL is missing (/api/health returns 500)
healthcheckPath = "/api/health/live"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
